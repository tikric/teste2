name: Android CI & Build APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual trigger from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Node.js for Web Assets compile
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Node dependencies and Compile Web app
        run: |
          if [ -f package-lock.json ]; then
            echo "package-lock.json found. Running npm ci..."
            npm ci --prefer-offline
          else
            echo "package-lock.json not found! Falling back to npm install..."
            npm install --prefer-offline
          fi
          npm run build
        env:
          NODE_ENV: production
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Create fallback .env file if not present
        run: |
          if [ ! -f .env ]; then
            cp .env.example .env
          fi
          if [ ! -f app/.env ]; then
            cp .env.example app/.env
          fi

      - name: Grant Execute Permission to gradlew
        run: |
          chmod +x gradlew || true
          chmod +x app/gradlew || true

      - name: Prepare Keystore File
        id: keystore-setup
        run: |
          HAS_KEYSTORE="false"
          # Search recursively for any .jks file, excluding default/debug keys and checking we do not pick up text/LFS pointers
          RECURSIVE_JKS=$(find . -name "*.jks" -type f | grep -v "my-upload-key.jks" | grep -v "bambuzau-debug.jks" | head -n 1)
          
          # Verify that the found recursive keystore is not a Git LFS pointer text file
          if [ -n "$RECURSIVE_JKS" ]; then
            if grep -q "version https://git-lfs" "$RECURSIVE_JKS" 2>/dev/null; then
              echo "⚠️ WARNING: $RECURSIVE_JKS is a Git LFS pointer (not a binary)! Skipping."
              RECURSIVE_JKS=""
            elif [ $(wc -c < "$RECURSIVE_JKS") -lt 500 ]; then
              echo "⚠️ WARNING: $RECURSIVE_JKS is too small or invalid! Skipping."
              RECURSIVE_JKS=""
            fi
          fi

          if [ -n "$RECURSIVE_JKS" ]; then
            echo "Found committed real JKS file recursively at: $RECURSIVE_JKS"
            cp "$RECURSIVE_JKS" my-upload-key.jks
            HAS_KEYSTORE="true"
          elif [ -f "bambuzau.jks" ] && ! grep -q "version https://git-lfs" bambuzau.jks 2>/dev/null && [ $(wc -c < "bambuzau.jks") -ge 500 ]; then
            echo "Found committed valid bambuzau.jks file in root! Using it."
            cp bambuzau.jks my-upload-key.jks
            HAS_KEYSTORE="true"
          elif [ -f "my-upload-key.jks" ] && ! grep -q "version https://git-lfs" my-upload-key.jks 2>/dev/null && [ $(wc -c < "my-upload-key.jks") -ge 500 ]; then
            echo "Found committed valid my-upload-key.jks file in root!"
            HAS_KEYSTORE="true"
          elif [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "Decoding Keystore from ANDROID_KEYSTORE_BASE64 secret..."
            # Strip whitespace/newlines and decode safely
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | tr -d '\r\n ' | base64 --decode > my-upload-key.jks || true
            if [ -s "my-upload-key.jks" ] && ! grep -q "version https://git-lfs" my-upload-key.jks 2>/dev/null && [ $(wc -c < "my-upload-key.jks") -ge 500 ]; then
              HAS_KEYSTORE="true"
            else
              echo "Decoding of Base64 keystore failed, empty, or invalid file."
              rm -f my-upload-key.jks
            fi
          fi
          
          DETECTED_ALIAS=""
          if [ "$HAS_KEYSTORE" = "true" ]; then
            echo "=================================================="
            echo "🔍 DIAGNOSTICO DE ENTRADAS DO KEYSTORE"
            echo "=================================================="
            STORE_PASS_TEMP="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
            if [ -z "$STORE_PASS_TEMP" ]; then
              echo "❌ ERRO: A senha ANDROID_KEYSTORE_PASSWORD esta vazia nas Secrets do GitHub!"
            else
              # Listar e capturar o primeiro alias privado do keystore de forma segura
              DETECTED_ALIAS=$(keytool -list -keystore my-upload-key.jks -storepass "$STORE_PASS_TEMP" 2>/dev/null | grep -i "PrivateKeyEntry" | cut -d',' -f1 | head -n 1 | xargs)
              if [ -z "$DETECTED_ALIAS" ]; then
                 # Fallback para regex genérico caso o idioma local mude a string PrivateKeyEntry
                 DETECTED_ALIAS=$(keytool -list -keystore my-upload-key.jks -storepass "$STORE_PASS_TEMP" 2>/dev/null | grep -E "^[a-zA-Z0-9_-]+," | cut -d',' -f1 | head -n 1 | xargs)
              fi
              
              if [ -n "$DETECTED_ALIAS" ]; then
                echo "✅ SUCESSO: Alias autodetectado no seu arquivo .jks: $DETECTED_ALIAS"
              else
                echo "⚠️ AVISO: Nao foi possivel ler o alias de forma automatica do JKS. Sera usado o padrao."
              fi
            fi
            echo "=================================================="
          fi

          FINAL_ALIAS="${{ secrets.ANDROID_KEY_ALIAS }}"
          # Se o alias autodetectado for encontrado no arquivo JKS, usamos ele para garantir 100% de compatibilidade
          if [ -n "$DETECTED_ALIAS" ]; then
             echo "Forçando o uso do alias autodetectado no arquivo JKS para evitar inconsistências: $DETECTED_ALIAS"
             FINAL_ALIAS="$DETECTED_ALIAS"
          fi
          
          if [ -z "$FINAL_ALIAS" ]; then
             FINAL_ALIAS="upload"
          fi
          
          echo "has_keystore=$HAS_KEYSTORE" >> $GITHUB_OUTPUT
          echo "key_alias=$FINAL_ALIAS" >> $GITHUB_OUTPUT

      - name: Build Android Release APK with Gradle
        working-directory: app
        env:
          KEYSTORE_PATH: ../my-upload-key.jks
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ steps.keystore-setup.outputs.key_alias }}
        run: ./gradlew clean assembleRelease --stacktrace --no-daemon

      - name: Check if Release APK was created
        id: check-release-apk
        run: |
          if [ -f "app/build/outputs/apk/release/app-release.apk" ]; then
            echo "release_ok=true" >> $GITHUB_OUTPUT
            echo "apk_path=app/build/outputs/apk/release/app-release.apk" >> $GITHUB_OUTPUT
            echo "Release APK generated successfully!"
          elif [ -f "app/app/build/outputs/apk/release/app-release.apk" ]; then
            echo "release_ok=true" >> $GITHUB_OUTPUT
            echo "apk_path=app/app/build/outputs/apk/release/app-release.apk" >> $GITHUB_OUTPUT
            echo "Release APK generated successfully!"
          else
            echo "release_ok=false" >> $GITHUB_OUTPUT
            echo "Release APK generation failed or was skipped."
          fi

      - name: Upload Signed Release APK artifact
        if: ${{ steps.check-release-apk.outputs.release_ok == 'true' }}
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: app-release-signed-apk
          path: ${{ steps.check-release-apk.outputs.apk_path }}
          retention-days: 1

      - name: Build Android Debug APK with Gradle (Fallback)
        if: ${{ steps.check-release-apk.outputs.release_ok != 'true' }}
        working-directory: app
        run: ./gradlew clean assembleDebug --stacktrace --no-daemon

      - name: Determine Debug APK path
        if: ${{ steps.check-release-apk.outputs.release_ok != 'true' }}
        id: check-debug-apk
        run: |
          if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "apk_path=app/build/outputs/apk/debug/app-debug.apk" >> $GITHUB_OUTPUT
          elif [ -f "app/app/build/outputs/apk/debug/app-debug.apk" ]; then
            echo "apk_path=app/app/build/outputs/apk/debug/app-debug.apk" >> $GITHUB_OUTPUT
          else
            echo "Debug APK not found."
            exit 1
          fi

      - name: Upload Debug APK artifact (Fallback)
        if: ${{ steps.check-release-apk.outputs.release_ok != 'true' }}
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: ${{ steps.check-debug-apk.outputs.apk_path }}
          retention-days: 1
