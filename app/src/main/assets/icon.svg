<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle (Warm off-white background matching the brand card) -->
  <circle cx="50" cy="50" r="48" fill="#F7F4E9" stroke="#E5DFD0" stroke-width="1" />
  
  <!-- Circle Border (Sage leaf green) -->
  <circle cx="50" cy="50" r="38" stroke="#637E55" stroke-width="2.5" stroke-dasharray="210 30" stroke-linecap="round" transform="rotate(-15 50 50)" />
  
  <!-- Bamboo Stem 1 (Left - green, 3 segments) -->
  <rect x="36" y="36" width="5" height="11" rx="1.5" fill="#637E55" />
  <rect x="37" y="48" width="5" height="15" rx="1.5" fill="#637E55" />
  <rect x="38" y="64" width="5" height="18" rx="1.5" fill="#637E55" />
  
  <!-- Bamboo Stem 2 (Middle Left - smaller, green, 2 segments) -->
  <rect x="44" y="47" width="4" height="12" rx="1" fill="#637E55" opacity="0.85" />
  <rect x="44.5" y="60" width="4" height="17" rx="1" fill="#637E55" opacity="0.85" />
  
  <!-- Bamboo Stem 3 (Taller Center - Bamboo Gold, 4 segments) -->
  <rect x="52" y="24" width="6" height="13" rx="2" fill="#E2B144" />
  <rect x="52.2" y="38.5" width="6" height="13.5" rx="2" fill="#E2B144" />
  <rect x="52.3" y="53.5" width="6" height="13.5" rx="2" fill="#E2B144" />
  <rect x="52.4" y="68.5" width="6" height="14" rx="2" fill="#E2B144" />
  
  <!-- Bamboo Stem 4 (Right - green, 3 segments) -->
  <rect x="62" y="43" width="4.5" height="10" rx="1" fill="#637E55" opacity="0.9" />
  <rect x="61.5" y="54.5" width="4.5" height="15" rx="1" fill="#637E55" opacity="0.9" />
  <rect x="61.2" y="71" width="4.5" height="10" rx="1" fill="#637E55" opacity="0.9" />
  
  <!-- Leaf Details -->
  <path d="M 37 36 C 34 30, 35 24, 42 32 C 38 32, 36 34, 37 36 Z" fill="#637E55" />
  <path d="M 38 50 C 30 46, 28 40, 35 47 C 34 48, 36 49, 38 50 Z" fill="#637E55" />
  <path d="M 58 30 C 63 24, 66 22, 59 30 Z" fill="#637E55" />
